# Server — Render sets PORT env var
server.port=${PORT:8080}

# PostgreSQL Database — uses environment variables with local fallbacks
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/financedb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:anurag}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.finance.manager=INFO
logging.level.org.springframework.security=WARN

# Session timeout (30 minutes)
server.servlet.session.timeout=30m
